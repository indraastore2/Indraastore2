<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>🚫 ACCESS DENIED 🚫</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Share Tech Mono", monospace;
      color: #00eaff;
      background: linear-gradient(135deg, #000016 0%, #0a0040 40%, #330070 70%, #00d4ff 100%);
      background-size: 300% 300%;
      animation: gradientShift 10s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .box {
      border: 2px solid #00eaff;
      padding: 40px 60px;
      border-radius: 20px;
      box-shadow: 0 0 30px #00eaff, inset 0 0 15px #0077aa;
      text-align: center;
      backdrop-filter: blur(10px);
      background: rgba(0, 30, 50, 0.25);
      position: relative;
      z-index: 2;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 25px #00eaff, inset 0 0 10px #0077aa;
      }
      50% {
        box-shadow: 0 0 40px #00ffff, inset 0 0 20px #00ccff;
      }
    }

    h1 {
      font-family: "Orbitron", sans-serif;
      font-size: 2.5rem;
      margin-bottom: 15px;
      text-shadow: 0 0 10px #00eaff, 0 0 25px #00c8ff;
      animation: glitch 1.5s infinite;
    }

    p {
      font-size: 1rem;
      color: #cceeff;
      text-shadow: 0 0 6px #00aaff;
      line-height: 1.5;
      min-height: 40px;
    }

    @keyframes glitch {
      0%,100% { text-shadow: 2px 2px #ff00ff, -2px -2px #00ffff; }
      50% { text-shadow: -2px -2px #ff00ff, 2px 2px #00ffff; }
    }

    .scan-line {
      position: absolute;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, transparent, #00eaff, transparent);
      animation: scan 2.5s linear infinite;
    }

    @keyframes scan {
      0% { top: 0; opacity: 0.2; }
      50% { top: 100%; opacity: 1; }
      100% { top: 0; opacity: 0.2; }
    }

    .countdown {
      margin-top: 12px;
      font-size: 0.9rem;
      color: #00ffee;
      opacity: 0.8;
      letter-spacing: 1px;
    }

    @keyframes fadeout {
      0% { opacity: 1; filter: blur(0px); }
      100% { opacity: 0; filter: blur(20px); }
    }

    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .particles span {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #00eaff;
      opacity: 0.5;
      border-radius: 50%;
      animation: move 10s linear infinite;
    }

    @keyframes move {
      from { transform: translateY(0) scale(1); opacity: 0.8; }
      to { transform: translateY(100vh) scale(0.2); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="particles">
    <script>
      for (let i = 0; i < 40; i++) {
        const star = document.createElement('span');
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 8 + 's';
        star.style.animationDuration = 6 + Math.random() * 6 + 's';
        document.body.querySelector('.particles').appendChild(star);
      }
    </script>
  </div>

  <div class="box">
    <div class="scan-line"></div>
    <h1>🚫 ACCESS DENIED 🚫</h1>
    <p id="text"></p>
    <div class="countdown" id="countdown"></div>
  </div>

  <audio id="alertSound" src="https://cdn.pixabay.com/download/audio/2023/03/28/audio_0f9a1b9b84.mp3?filename=alarm-short-110624.mp3" preload="auto"></audio>

  <script>
    const textElement = document.getElementById("text");
    const countdownElement = document.getElementById("countdown");
    const alarm = document.getElementById("alertSound");

    const messages = [
      "DEVELOPER TOOLS DETECTED.",
      "INTRUSION ALERT — SYSTEM LOCKDOWN INITIATED.",
      "SECURITY BY: INDRA STORE.",
      "AUTO TERMINATION IN PROGRESS..."
    ];

    let i = 0;
    function typeMessage() {
      if (i < messages.length) {
        let msg = messages[i];
        let j = 0;
        const typing = setInterval(() => {
          textElement.textContent = msg.substring(0, j);
          j++;
          if (j > msg.length) {
            clearInterval(typing);
            i++;
            setTimeout(typeMessage, 800);
          }
        }, 45);
      }
    }
    typeMessage();

    alarm.volume = 0.3;
    alarm.play();

    function speak(text) {
      if ("speechSynthesis" in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.pitch = 0.6;
        utterance.rate = 0.9;
        utterance.volume = 1;
        utterance.lang = "en-US";
        speechSynthesis.speak(utterance);
      }
    }

    setTimeout(() => {
      speak("Access denied. Intrusion detected. Lockdown active.");
    }, 500);

    const delay = Math.floor(Math.random() * 10000) + 10000;
    let timeLeft = Math.floor(delay / 1000);
    countdownElement.textContent = `AUTO CLOSE IN: ${timeLeft}s`;

    const countdown = setInterval(() => {
      timeLeft--;
      countdownElement.textContent = `AUTO CLOSE IN: ${timeLeft}s`;
      if (timeLeft <= 0) {
        clearInterval(countdown);
        try {
          window.open('', '_self').close();
        } catch {
          document.body.style.animation = "fadeout 2s forwards";
          setTimeout(() => {
            document.body.innerHTML = "<h1 style='color:#00eaff;text-align:center;margin-top:40vh;font-family:Orbitron;'>SYSTEM TERMINATED 🔒</h1>";
          }, 1800);
        }
      }
    }, 1000);
  </script>
</body>
</html>
