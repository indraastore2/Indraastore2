<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDRA AI</title>
    <link rel="icon" href="LOGO_INDRAA_STORE.png" type="image/jpeg">
    <link rel="apple-touch-icon" href="LOGO_INDRAA_STORE.png">
    <link rel="stylesheet" href="ai.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body>
    <div class="ai-header">
        <div class="ai-title">INDRA<span>AI</span></div>
        <div style="display: flex; gap: 10px;">
            <button id="clearBtn" class="back-btn btn-danger">Hapus Chat</button>
            <a href="index.html" class="back-btn">Kembali</a>
        </div>
    </div>
    
<div id="announcementModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2>INDRA AI</h2>
        </div>
        <div class="modal-body">
            <p>Selamat datang di <b>INDRA CHAT AI</b></p>
            <ul>
                <li>🗒️ Note : Jika AI Tidak Menjawab Coba Untuk Mengganti Model AI Di Pengaturan</li>
            </ul>
        </div>
        <div class="modal-footer">
            <button id="closeModal" class="modal-btn">Mulai Chat</button>
        </div>
    </div>
</div>

    
    <div id="welcome-screen" class="welcome-container">
        <h1 class="neuron-text">NEURON ENGINE</h1>
        <p class="indra-text">INDRA AI</p>
    </div>

    <div class="chat-container" id="chat"></div>

<div class="chat-input">
    <div class="input-group">
        <select id="modelSelect">
            <option value="gemini-2.5-flash">Gemini 2.5</option>
            <option value="gemini-2.5-flash-v2">Gemini 2.5 V2</option>
            <option value="gpt-4">GPT 4</option>
        </select>

        <textarea id="prompt" placeholder="Tanya sesuatu ke AI..." rows="1"></textarea>
        
        <button id="sendBtn" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
</div>



    <script src="ai.js"></script>
</body>
</html>
